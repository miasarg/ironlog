<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iron Log</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#101317">
<link rel="apple-touch-icon" href="icon.png">
<script>
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
</script>
<style>
  :root{
    --bg:#101317;
    --card:#1a1f26;
    --card-2:#232a33;
    --line:#2e3742;
    --text:#eef1f4;
    --muted:#8b97a5;
    --faint:#5c6875;
    --accent:#ffb020;      /* bumper-plate amber */
    --accent-ink:#1a1205;
    --danger:#ff6b5e;
    --ok:#5dd39e;
    --radius:14px;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.45;
    padding:max(14px,env(safe-area-inset-top)) 14px calc(90px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .sub{color:var(--muted);font-size:14px;margin-top:4px}

  /* buttons */
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  .btn{
    display:block;width:100%;padding:15px;border-radius:var(--radius);
    background:var(--accent);color:var(--accent-ink);font-weight:700;font-size:16px;
    text-align:center;
  }
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
  .btn.danger-ghost{background:transparent;color:var(--danger);border:1px dashed var(--line)}
  .icon-btn{
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    background:var(--card-2);color:var(--muted);font-size:17px;flex:none;
  }
  .icon-btn:active{background:var(--line)}

  /* header */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .topbar .grow{flex:1;min-width:0}
  .back{font-size:15px;color:var(--accent);font-weight:600;padding:6px 8px 6px 0;flex:none}

  /* home cards */
  .day-card{
    display:block;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px;position:relative;overflow:hidden;
  }
  .day-card:active{background:var(--card-2)}
  .day-card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);opacity:.9;
  }
  .day-card .name{font-size:18px;font-weight:700}
  .day-card .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px;display:flex;gap:14px}
  .day-card .in-progress{color:var(--ok)}
  .card-row{display:flex;align-items:center;gap:8px}
  .card-row .day-card{flex:1;margin-bottom:0}
  .card-stack{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}

  /* exercise blocks */
  .exercise{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 14px 12px;margin-bottom:14px;
  }
  .ex-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px}
  .ex-name{font-size:17px;font-weight:700}
  .ex-target{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap}

  .set-grid{display:grid;grid-template-columns:34px 1fr 1fr 1fr 34px;gap:8px;align-items:center}
  .col-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:center;padding-bottom:2px}
  .set-num{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:center}
  .prev{
    font-family:var(--mono);font-size:13px;color:var(--faint);text-align:center;
    background:var(--card-2);border-radius:9px;padding:11px 4px;white-space:nowrap;overflow:hidden;
  }
  .set-grid input{
    width:100%;padding:11px 4px;border-radius:9px;border:1px solid var(--line);
    background:var(--bg);color:var(--text);font-family:var(--mono);font-size:15px;text-align:center;
    -moz-appearance:textfield;
  }
  .set-grid input::-webkit-outer-spin-button,.set-grid input::-webkit-inner-spin-button{-webkit-appearance:none}
  .set-grid input:focus{outline:none;border-color:var(--accent)}
  .set-grid input::placeholder{color:var(--faint)}
  .set-grid input.filled{border-color:var(--ok);background:rgba(93,211,158,.06)}
  .del-set{color:var(--faint);font-size:18px;text-align:center;padding:8px 0}
  .del-set:active{color:var(--danger)}
  .add-set{
    margin-top:10px;width:100%;padding:10px;border-radius:9px;border:1px dashed var(--line);
    color:var(--muted);font-size:14px;font-weight:600;
  }
  .add-set:active{color:var(--accent);border-color:var(--accent)}

  /* forms (edit view) */
  .field{margin-bottom:14px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input{
    width:100%;padding:13px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:16px;
  }
  .field input:focus{outline:none;border-color:var(--accent)}
  .edit-ex{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;margin-bottom:10px;
  }
  .edit-ex .row1{display:flex;gap:8px;margin-bottom:8px}
  .edit-ex .row1 input{flex:1;min-width:0}
  .edit-ex .row2{display:flex;gap:8px;align-items:center}
  .edit-ex input{
    padding:11px;border-radius:9px;border:1px solid var(--line);
    background:var(--bg);color:var(--text);font-size:15px;
  }
  .edit-ex input:focus{outline:none;border-color:var(--accent)}
  .edit-ex .small{width:0;flex:1;text-align:center;font-family:var(--mono)}
  .edit-ex .x-label{font-family:var(--mono);font-size:12px;color:var(--faint)}
  .hint{font-size:13px;color:var(--faint);margin:6px 2px 16px}

  /* calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav .month{font-size:17px;font-weight:700}
  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:10px;margin-bottom:16px;
  }
  .cal-dow{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--faint);text-align:center;padding:4px 0}
  .cal-day{
    aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;
    font-family:var(--mono);font-size:13px;color:var(--muted);position:relative;
  }
  .cal-day.blank{visibility:hidden}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;background:transparent}
  .cal-day.has .dot{background:var(--accent)}
  .cal-day.has{color:var(--text);font-weight:700}
  .cal-day.today{border:1px solid var(--line)}
  .cal-day.sel{background:var(--accent);color:var(--accent-ink)}
  .cal-day.sel .dot{background:var(--accent-ink)}
  .session{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;
  }
  .session .s-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:8px}
  .session .s-name{font-weight:700;font-size:16px}
  .session .s-time{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
  .session .s-ex{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px solid var(--line);font-size:14px}
  .session .s-ex .s-sets{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:right}

  /* sticky footer action */
  .footer-action{
    position:fixed;left:0;right:0;bottom:0;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--bg) 35%);
    max-width:520px;margin:0 auto;
  }

  /* empty state */
  .empty{
    text-align:center;padding:44px 20px;color:var(--muted);
    border:1px dashed var(--line);border-radius:var(--radius);margin-bottom:14px;
  }
  .empty .big{font-size:34px;margin-bottom:8px}

  .toast{
    position:fixed;left:50%;transform:translateX(-50%);bottom:calc(100px + env(safe-area-inset-bottom));
    background:var(--card-2);border:1px solid var(--line);color:var(--text);
    padding:10px 18px;border-radius:99px;font-size:14px;font-weight:600;
    opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:50;
  }
  .toast.show{opacity:1}
  .loading{text-align:center;color:var(--faint);padding:60px 0;font-family:var(--mono);font-size:13px}
</style>
</head>
<body>
<div id="app"><div class="loading">LOADING…</div></div>
<div id="toast" class="toast"></div>

<script>
(function(){
"use strict";

const KEY = "ironlog:data";
const $app = document.getElementById("app");

let data = null;          // { workouts:[], history:{}, active:{} }
let view = { name: "home" };
let saveTimer = null;
let memoryOnly = false;

/* ---------- storage ----------
   Works in two environments:
   - Claude artifacts: window.storage (key-value API)
   - Standalone / offline (Safari, home-screen app): localStorage       */

const hasClaudeStorage = typeof window.storage !== "undefined" && window.storage && typeof window.storage.get === "function";

async function storageGet(){
  if(hasClaudeStorage){
    const res = await window.storage.get(KEY);
    return res ? res.value : null;
  }
  return localStorage.getItem(KEY);
}

async function storageSet(val){
  if(hasClaudeStorage){
    const r = await window.storage.set(KEY, val);
    if(!r) throw new Error("save failed");
    return;
  }
  localStorage.setItem(KEY, val);
}

async function load(){
  try{
    const raw = await storageGet();
    data = raw ? JSON.parse(raw) : null;
  }catch(e){
    data = null;
  }
  if(!data || !Array.isArray(data.workouts)){
    data = seed();
    persist();
  }
  if(!Array.isArray(data.log)){ data.log = []; persist(); }  // migration for older saves
  render();
}

function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await storageSet(JSON.stringify(data));
      memoryOnly = false;
    }catch(e){
      if(!memoryOnly){ memoryOnly = true; toast("Couldn't save — changes are temporary"); }
    }
  }, 400);
}

function seed(){
  return {
    workouts:[{
      id: uid(), name:"Push Day (example)",
      exercises:[
        {id:uid(), name:"Bench Press", sets:3, reps:"8-10"},
        {id:uid(), name:"Overhead Press", sets:3, reps:"8-12"},
        {id:uid(), name:"Cable Fly", sets:3, reps:"12-15"}
      ]
    }],
    history:{},   // workoutId -> { lastDate, entries: { exId: [{w,r}] } }
    active:{},    // workoutId -> { entries: { exId: [{w,r}] } }
    log:[]        // finished sessions -> { date, workoutId, name, exercises:[{name, sets:[{w,r}]}] }
  };
}

/* ---------- helpers ---------- */

function uid(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function getWorkout(id){ return data.workouts.find(w=>w.id===id); }

function fmtDate(iso){
  if(!iso) return null;
  const d = new Date(iso), now = new Date();
  const days = Math.floor((now - d)/86400000);
  if(days===0) return "today";
  if(days===1) return "yesterday";
  if(days<7) return days+" days ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------- rendering ---------- */

function render(){
  if(view.name==="home") renderHome();
  else if(view.name==="workout") renderWorkout(view.id);
  else if(view.name==="edit") renderEdit(view.id);
  else if(view.name==="backup") renderBackup();
  else if(view.name==="calendar") renderCalendar();
  window.scrollTo(0,0);
}

function renderHome(){
  let html = `
    <div class="topbar">
      <div class="grow">
        <div class="eyebrow">Iron Log</div>
        <h1>Workouts</h1>
      </div>
      <button class="icon-btn" data-cal aria-label="Calendar">📅</button>
      <button class="icon-btn" data-backup aria-label="Backup and restore">⤓</button>
    </div>`;

  if(data.workouts.length===0){
    html += `<div class="empty"><div class="big">🏋️</div>No workouts yet.<br>Add your first training day below.</div>`;
  } else {
    html += `<div class="card-stack">`;
    for(const w of data.workouts){
      const hist = data.history[w.id];
      const inProgress = data.active[w.id] && hasAnyEntry(data.active[w.id]);
      const last = hist ? fmtDate(hist.lastDate) : null;
      html += `
      <div class="card-row">
        <button class="day-card" data-open="${w.id}">
          <div class="name">${esc(w.name)}</div>
          <div class="meta">
            <span>${w.exercises.length} exercise${w.exercises.length===1?"":"s"}</span>
            ${inProgress ? `<span class="in-progress">● in progress</span>` : last ? `<span>last: ${last}</span>` : `<span>never logged</span>`}
          </div>
        </button>
        <button class="icon-btn" data-edit="${w.id}" aria-label="Edit workout">✎</button>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div class="footer-action"><button class="btn" data-new>+ New workout</button></div>`;
  $app.innerHTML = html;

  $app.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ view={name:"workout",id:b.dataset.open}; render(); });
  $app.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ view={name:"edit",id:b.dataset.edit}; render(); });
  $app.querySelector("[data-backup]").onclick = ()=>{ view={name:"backup"}; render(); };
  $app.querySelector("[data-cal]").onclick = ()=>{
    const now = new Date();
    view={name:"calendar", y:now.getFullYear(), m:now.getMonth(), sel:dayKey(now)};
    render();
  };
  const nb = $app.querySelector("[data-new]");
  if(nb) nb.onclick = ()=>{
    const w = {id:uid(), name:"New workout", exercises:[]};
    data.workouts.push(w); persist();
    view={name:"edit",id:w.id}; render();
  };
}

function hasAnyEntry(session){
  return session && session.entries && Object.values(session.entries).some(arr=>arr.some(s=>s.w!=="" || s.r!==""));
}

/* ----- workout logging view ----- */

function ensureActive(w){
  if(!data.active[w.id]) data.active[w.id] = {entries:{}};
  const act = data.active[w.id];
  const hist = data.history[w.id];
  for(const ex of w.exercises){
    if(!act.entries[ex.id]){
      const prevCount = hist && hist.entries[ex.id] ? hist.entries[ex.id].length : 0;
      const n = Math.max(prevCount, ex.sets||1, 1);
      act.entries[ex.id] = Array.from({length:n}, ()=>({w:"",r:""}));
    }
  }
  return act;
}

function renderWorkout(id){
  const w = getWorkout(id);
  if(!w){ view={name:"home"}; return render(); }
  const act = ensureActive(w);
  const hist = data.history[id];

  let html = `
    <div class="topbar">
      <button class="back" data-back>‹ Back</button>
      <div class="grow">
        <h1 style="font-size:21px">${esc(w.name)}</h1>
        ${hist ? `<div class="sub">Previous session: ${fmtDate(hist.lastDate)}</div>` : `<div class="sub">First session — no previous data yet</div>`}
      </div>
      <button class="icon-btn" data-edit aria-label="Edit workout">✎</button>
    </div>`;

  if(w.exercises.length===0){
    html += `<div class="empty">No exercises in this workout yet.<br>Tap ✎ to add some.</div>`;
  }

  for(const ex of w.exercises){
    const sets = act.entries[ex.id];
    const prev = hist && hist.entries[ex.id] ? hist.entries[ex.id] : [];
    html += `
    <div class="exercise" data-ex="${ex.id}">
      <div class="ex-head">
        <div class="ex-name">${esc(ex.name)}</div>
        <div class="ex-target">target ${ex.sets} × ${esc(ex.reps)}</div>
      </div>
      <div class="set-grid">
        <div class="col-label">Set</div>
        <div class="col-label">Last</div>
        <div class="col-label">Lbs</div>
        <div class="col-label">Reps</div>
        <div class="col-label"></div>`;
    sets.forEach((s,i)=>{
      const p = prev[i];
      const pTxt = p && (p.w!=="" || p.r!=="") ? `${p.w||"–"}×${p.r||"–"}` : "—";
      html += `
        <div class="set-num">${i+1}</div>
        <div class="prev">${esc(pTxt)}</div>
        <input type="number" inputmode="decimal" step="any" class="${s.w!==""?"filled":""}"
               value="${esc(s.w)}" placeholder="${p&&p.w!==""?esc(p.w):"lbs"}"
               data-in="w" data-ex="${ex.id}" data-i="${i}">
        <input type="number" inputmode="numeric" class="${s.r!==""?"filled":""}"
               value="${esc(s.r)}" placeholder="${p&&p.r!==""?esc(p.r):"reps"}"
               data-in="r" data-ex="${ex.id}" data-i="${i}">
        <button class="del-set" data-del data-ex="${ex.id}" data-i="${i}" aria-label="Delete set">✕</button>`;
    });
    html += `
      </div>
      <button class="add-set" data-add="${ex.id}">+ Add set</button>
    </div>`;
  }

  if(w.exercises.length>0){
    html += `<div class="footer-action"><button class="btn" data-finish>Finish workout</button></div>`;
  }

  $app.innerHTML = html;

  $app.querySelector("[data-back]").onclick = ()=>{ view={name:"home"}; render(); };
  $app.querySelector("[data-edit]").onclick = ()=>{ view={name:"edit",id}; render(); };

  $app.querySelectorAll("input[data-in]").forEach(inp=>{
    inp.oninput = ()=>{
      const s = act.entries[inp.dataset.ex][+inp.dataset.i];
      s[inp.dataset.in] = inp.value;
      inp.classList.toggle("filled", inp.value!=="");
      persist();
    };
  });

  $app.querySelectorAll("[data-add]").forEach(b=>{
    b.onclick = ()=>{ act.entries[b.dataset.add].push({w:"",r:""}); persist(); render(); };
  });

  $app.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick = ()=>{
      const arr = act.entries[b.dataset.ex];
      if(arr.length<=1){ arr[0]={w:"",r:""}; } else { arr.splice(+b.dataset.i,1); }
      persist(); render();
    };
  });

  const fin = $app.querySelector("[data-finish]");
  if(fin) fin.onclick = ()=>{
    if(!hasAnyEntry(act)){ toast("Log at least one set first"); return; }
    if(!confirm("Finish this workout? Today's numbers become your new 'Last' values.")) return;
    const entries = {};
    for(const exId in act.entries){
      const logged = act.entries[exId].filter(s=>s.w!==""||s.r!=="");
      if(logged.length) entries[exId]=logged.map(s=>({w:s.w,r:s.r}));
    }
    data.history[id] = { lastDate:new Date().toISOString(), entries };
    // snapshot for the calendar (names, not ids, so it survives edits/deletes)
    data.log.push({
      date: new Date().toISOString(),
      workoutId: id,
      name: w.name,
      exercises: w.exercises
        .filter(ex=>entries[ex.id])
        .map(ex=>({name:ex.name, sets:entries[ex.id]}))
    });
    delete data.active[id];
    persist();
    toast("Workout saved 💪");
    view={name:"home"}; render();
  };
}

/* ----- calendar view ----- */

function dayKey(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}

function renderCalendar(){
  const {y, m} = view;
  const monthName = new Date(y, m, 1).toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayKey = dayKey(new Date());

  // group logged sessions by day
  const byDay = {};
  for(const s of data.log){
    const k = dayKey(s.date);
    (byDay[k] = byDay[k] || []).push(s);
  }

  const total = data.log.length;
  const thisMonth = data.log.filter(s=>{
    const d = new Date(s.date);
    return d.getFullYear()===y && d.getMonth()===m;
  }).length;

  let html = `
    <div class="topbar">
      <button class="back" data-back>‹ Back</button>
      <div class="grow">
        <h1 style="font-size:21px">Calendar</h1>
        <div class="sub">${thisMonth} workout${thisMonth===1?"":"s"} this month · ${total} all time</div>
      </div>
    </div>
    <div class="cal-nav">
      <button class="icon-btn" data-prev aria-label="Previous month">‹</button>
      <div class="month">${esc(monthName)}</div>
      <button class="icon-btn" data-next aria-label="Next month">›</button>
    </div>
    <div class="cal-grid">`;

  for(const d of ["S","M","T","W","T","F","S"]) html += `<div class="cal-dow">${d}</div>`;
  for(let i=0;i<firstDow;i++) html += `<div class="cal-day blank"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k = y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const cls = ["cal-day"];
    if(byDay[k]) cls.push("has");
    if(k===todayKey) cls.push("today");
    if(k===view.sel) cls.push("sel");
    html += `<button class="${cls.join(" ")}" data-day="${k}">${d}<span class="dot"></span></button>`;
  }
  html += `</div>`;

  // selected day detail
  const sel = view.sel;
  const sessions = sel && byDay[sel] ? byDay[sel] : [];
  const selDate = sel ? new Date(sel+"T12:00:00") : null;
  if(sel){
    html += `<div class="field"><label>${esc(selDate.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}))}</label></div>`;
    if(sessions.length===0){
      html += `<div class="empty" style="padding:24px 20px">No workout logged this day.</div>`;
    }
    for(const s of sessions){
      const t = new Date(s.date).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
      html += `
      <div class="session">
        <div class="s-head">
          <div class="s-name">${esc(s.name)}</div>
          <div class="s-time">finished ${esc(t)}</div>
        </div>`;
      for(const ex of (s.exercises||[])){
        const setsTxt = ex.sets.map(x=>`${x.w||"–"}×${x.r||"–"}`).join("  ");
        html += `
        <div class="s-ex">
          <div>${esc(ex.name)}</div>
          <div class="s-sets">${esc(setsTxt)}</div>
        </div>`;
      }
      html += `</div>`;
    }
  }

  $app.innerHTML = html;

  $app.querySelector("[data-back]").onclick = ()=>{ view={name:"home"}; render(); };
  $app.querySelector("[data-prev]").onclick = ()=>{
    view.m--; if(view.m<0){ view.m=11; view.y--; } view.sel=null; render();
  };
  $app.querySelector("[data-next]").onclick = ()=>{
    view.m++; if(view.m>11){ view.m=0; view.y++; } view.sel=null; render();
  };
  $app.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{
    view.sel = (view.sel===b.dataset.day) ? null : b.dataset.day;
    render();
  });
}

/* ----- backup & restore view ----- */

function renderBackup(){
  const nWorkouts = data.workouts.length;
  const nLogged = Object.keys(data.history).length;

  $app.innerHTML = `
    <div class="topbar">
      <button class="back" data-back>‹ Back</button>
      <div class="grow"><h1 style="font-size:21px">Backup &amp; restore</h1></div>
    </div>

    <div class="field"><label>Export</label></div>
    <p class="hint" style="margin-top:0">Saves everything — ${nWorkouts} workout${nWorkouts===1?"":"s"}, ${nLogged} with logged history — as a small text file. Keep it in Files, iCloud, or Notes.</p>
    <button class="btn" data-export style="margin-bottom:10px">Save backup file</button>
    <button class="btn ghost" data-copy style="margin-bottom:24px">Copy backup text instead</button>

    <div class="field"><label>Restore</label></div>
    <p class="hint" style="margin-top:0">Open a backup file, copy its contents, paste below, and tap Restore. This replaces everything currently in the app.</p>
    <div class="field">
      <textarea data-paste placeholder='Paste backup text here…' style="width:100%;min-height:110px;padding:13px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--text);font-family:var(--mono);font-size:13px;resize:vertical"></textarea>
    </div>
    <button class="btn ghost" data-restore>Restore from pasted text</button>`;

  $app.querySelector("[data-back]").onclick = ()=>{ view={name:"home"}; render(); };

  const backupString = ()=> JSON.stringify({app:"ironlog", exported:new Date().toISOString(), data});
  const fname = ()=> "ironlog-backup-" + new Date().toISOString().slice(0,10) + ".json";

  $app.querySelector("[data-export]").onclick = async ()=>{
    const text = backupString();
    // Preferred on iPhone: the native share sheet (save to Files, AirDrop, etc.)
    if(navigator.share){
      try{
        const file = new File([text], fname(), {type:"application/json"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Iron Log backup"});
          return;
        }
        await navigator.share({title:"Iron Log backup", text});
        return;
      }catch(e){ if(e && e.name==="AbortError") return; }
    }
    // Fallback: download the file directly
    try{
      const url = URL.createObjectURL(new Blob([text], {type:"application/json"}));
      const a = document.createElement("a");
      a.href = url; a.download = fname();
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
      toast("Backup downloaded");
    }catch(e){
      toast("Couldn't save — use Copy instead");
    }
  };

  $app.querySelector("[data-copy]").onclick = async ()=>{
    const text = backupString();
    try{
      await navigator.clipboard.writeText(text);
      toast("Copied — paste it somewhere safe");
    }catch(e){
      const ta = $app.querySelector("[data-paste]");
      ta.value = text; ta.select();
      toast("Copy the text shown below");
    }
  };

  $app.querySelector("[data-restore]").onclick = ()=>{
    const raw = $app.querySelector("[data-paste]").value.trim();
    if(!raw){ toast("Paste a backup first"); return; }
    let parsed;
    try{
      parsed = JSON.parse(raw);
    }catch(e){ toast("That doesn't look like a valid backup"); return; }
    const payload = parsed && parsed.app==="ironlog" ? parsed.data : parsed;
    if(!payload || !Array.isArray(payload.workouts)){ toast("That doesn't look like a valid backup"); return; }
    if(!confirm("Replace ALL current workouts and history with this backup?")) return;
    data = {
      workouts: payload.workouts,
      history: payload.history || {},
      active: payload.active || {},
      log: payload.log || []
    };
    persist();
    toast("Backup restored");
    view={name:"home"}; render();
  };
}

/* ----- edit view ----- */

function renderEdit(id){
  const w = getWorkout(id);
  if(!w){ view={name:"home"}; return render(); }

  let html = `
    <div class="topbar">
      <button class="back" data-done>‹ Done</button>
      <div class="grow"><h1 style="font-size:21px">Edit workout</h1></div>
    </div>
    <div class="field">
      <label>Workout name</label>
      <input type="text" value="${esc(w.name)}" data-wname placeholder="e.g. Push Day">
    </div>
    <div class="field"><label>Exercises</label></div>`;

  for(const ex of w.exercises){
    html += `
    <div class="edit-ex">
      <div class="row1">
        <input type="text" value="${esc(ex.name)}" placeholder="Exercise name" data-exname="${ex.id}">
        <button class="icon-btn" data-exdel="${ex.id}" aria-label="Delete exercise">🗑</button>
      </div>
      <div class="row2">
        <input type="number" inputmode="numeric" class="small" value="${esc(ex.sets)}" placeholder="Sets" data-exsets="${ex.id}">
        <span class="x-label">sets ×</span>
        <input type="text" class="small" value="${esc(ex.reps)}" placeholder="8-12" data-exreps="${ex.id}">
        <span class="x-label">reps</span>
      </div>
    </div>`;
  }

  html += `
    <button class="btn ghost" data-exadd style="margin-bottom:12px">+ Add exercise</button>
    <p class="hint">Target reps can be a range like "8-12". Deleting an exercise also removes its logged history.</p>
    <button class="btn danger-ghost" data-wdel>Delete this workout</button>
    <div class="footer-action"><button class="btn" data-done2>Done</button></div>`;

  $app.innerHTML = html;

  const done = ()=>{ view={name:"workout",id}; render(); };
  $app.querySelector("[data-done]").onclick = done;
  $app.querySelector("[data-done2]").onclick = done;

  $app.querySelector("[data-wname]").oninput = e=>{ w.name=e.target.value; persist(); };

  $app.querySelectorAll("[data-exname]").forEach(i=>i.oninput=e=>{
    w.exercises.find(x=>x.id===i.dataset.exname).name=e.target.value; persist();
  });
  $app.querySelectorAll("[data-exsets]").forEach(i=>i.oninput=e=>{
    w.exercises.find(x=>x.id===i.dataset.exsets).sets=parseInt(e.target.value)||1; persist();
  });
  $app.querySelectorAll("[data-exreps]").forEach(i=>i.oninput=e=>{
    w.exercises.find(x=>x.id===i.dataset.exreps).reps=e.target.value; persist();
  });

  $app.querySelectorAll("[data-exdel]").forEach(b=>b.onclick=()=>{
    const exId = b.dataset.exdel;
    if(!confirm("Delete this exercise and its history?")) return;
    w.exercises = w.exercises.filter(x=>x.id!==exId);
    if(data.history[id]) delete data.history[id].entries[exId];
    if(data.active[id]) delete data.active[id].entries[exId];
    persist(); render();
  });

  $app.querySelector("[data-exadd]").onclick = ()=>{
    w.exercises.push({id:uid(), name:"", sets:3, reps:"8-12"});
    persist(); render();
    const inputs = $app.querySelectorAll("[data-exname]");
    if(inputs.length) inputs[inputs.length-1].focus();
  };

  $app.querySelector("[data-wdel]").onclick = ()=>{
    if(!confirm(`Delete "${w.name}" and all of its history?`)) return;
    data.workouts = data.workouts.filter(x=>x.id!==id);
    delete data.history[id];
    delete data.active[id];
    persist();
    view={name:"home"}; render();
  };
}

load();
})();
</script>
</body>
</html>
